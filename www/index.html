<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orange Line Metro Bus — Islamabad</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header id="hdr">
    <div class="hdr-logos">
      <img class="hdr-logo" src="CDA.jpg" alt="CDA">
      <div class="hdr-divider"></div>
      <img class="hdr-logo" src="TAP.jpeg" alt="TAP">
    </div>
    <div class="hdr-mid">
      <div class="hdr-en">
        <img src="orange_line_metro_bus_v2.svg" alt="Bus" style="height:36px;">
        <span id="hdr-title-text">ORANGE LINE METRO BUS SERVICE — ISLAMABAD</span>
      </div>
      <div class="hdr-ur urdu">
        <span id="hdr-route-from">فیض احمد فیض اسٹیشن</span><span>↔</span><span id="hdr-route-to">اسلام آباد انٹرنیشنل ایئرپورٹ</span>
      </div>
    </div>
    <div class="hdr-clock">
      <div id="clock">00:00:00</div>
      <div id="cdate">Loading…</div>
    </div>
  </header>

  <div id="body">
    <div id="srow">
      <div class="scard scard-c">
        <div class="sbadge">
          <div class="dot-g"></div>
          <span style="color:var(--gr)">CURRENT STOP</span>
          <span class="sbadge-ur urdu">موجودہ اسٹاپ</span>
        </div>
        <div>
          <div class="sname-en" id="cur-en"></div>
          <div class="sname-ur urdu" id="cur-ur"></div>
        </div>
        <div class="scard-time" id="cur-time"></div>
      </div>

      <div id="eta-wrap">
        <div id="dir-arrow">▶</div>
        <div id="eta-ring">
          <div id="eta-n">—</div>
          <div id="eta-min">MIN</div>
          <div id="eta-ur" class="urdu">منٹ</div>
        </div>
      </div>

      <div class="scard scard-n">
        <div class="sbadge">
          <div class="dot-o"></div>
          <span style="color:var(--or3)">NEXT STOP</span>
          <span class="sbadge-ur urdu">اگلا اسٹاپ</span>
        </div>
        <div>
          <div class="sname-en" id="nxt-en"></div>
          <div class="sname-ur urdu" id="nxt-ur"></div>
        </div>
        <div class="scard-time" id="nxt-time"></div>
      </div>
    </div>

    <div id="prog-sec">
      <div class="sec-row">
        <span class="sec-en">Route Progress</span>
        <span class="sec-ur urdu">(راستے کی پیشرفت)</span>
        <span id="dir-banner"></span>
      </div>
      <div id="rtrack">
        <div id="rline-bg"></div>
        <div id="rline-done"></div>
        <div id="rstops"></div>
      </div>
    </div>

    <div id="ticker-wrap">
      <div id="ticker-scroll">
        <div id="ticker-inner"></div>
      </div>
    </div>
  </div>
</div>
<a href="settings.html" id="settings-gear" title="Settings">⚙</a>
<style>
  #settings-gear{
    position:fixed; right:14px; bottom:14px; z-index:9999;
    width:34px; height:34px; border-radius:50%;
    background:rgba(0,0,0,.35); color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; text-decoration:none;
    opacity:.18; transition:opacity .2s ease;
  }
  #settings-gear:active,#settings-gear:focus{opacity:.9;}
</style>
<script src="liveFeed.js"></script>
<script src="app.js"></script>
</body>
</html>
